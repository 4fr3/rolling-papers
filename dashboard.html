<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Rolling Papers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <header>
    <nav class="navbar">
      <a href="#" class="nav-logo">Rolling Papers</a>
      <ul class="nav-links">
        <li><a href="dashboard.html" class="active">Dashboard</a></li>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="login.html">Ingresar</a></li>
      </ul>
    </nav>
  </header>
<div class="container">
    <h1>Rolling Papers</h1>
    <div class="bienvenida" id="welcome-message" 
         style="color:#f4f4f4; background:linear-gradient(90deg,#7c3aed 0%,#f43f5e 100%);
         padding:12px 18px; border-radius:12px; font-weight:600; font-size:1.1rem;
         text-shadow:0 1px 6px #232946; box-shadow:0 2px 12px #7c3aed33;">
        Cargando...
    </div>

    <!-- Crear post -->
    <form id="post-form" style="margin-top:20px; background:#232946; padding:16px; border-radius:12px;">
        <textarea id="post-content" placeholder="Escribe tu post..." rows="3" 
                  style="width:100%; border-radius:8px; padding:8px;"></textarea>
        <button type="submit" style="margin-top:10px; padding:10px; border:none; border-radius:8px;
                                    background:linear-gradient(90deg,#7c3aed 0%,#f43f5e 100%);
                                    color:#fff; font-weight:600;">Publicar</button>
        <div id="post-error" style="color:#f43f5e; margin-top:8px;"></div>
    </form>

    <!-- Lista de posts -->
    <h2 style="margin-top:24px; color:#7c3aed;">Tus posts</h2>
    <ul id="posts-list" style="list-style:none; padding:0;"></ul>

    <button id="logout-btn" style="margin-top:20px; background:linear-gradient(90deg,#f43f5e 0%,#7c3aed 100%);
                                   color:#fff; border:none; border-radius:8px; padding:10px 0; font-weight:600; width:100%; max-width:200px;">
        Cerrar sesión
    </button>
</div>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://xooosccvdmnuzctgzjta.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhvb29zY2N2ZG1udXpjdGd6anRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU1NzQwNjIsImV4cCI6MjA3MTE1MDA2Mn0.HLqBrW71UcAkjmJj9d8vDI04Je05oBeX05u-QbWjd6c';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.addEventListener('DOMContentLoaded', async () => {
    // Obtener usuario
    const { data: { user }, error } = await supabase.auth.getUser();
    if (error || !user) {
        window.location.href = 'login.html';
        return;
    }

    // Mostrar username
    const { data: profileData } = await supabase
        .from('profiles')
        .select('username')
        .eq('id', user.id)
        .single();
    document.getElementById('welcome-message').textContent = profileData
        ? `¡Bienvenido/a, ${profileData.username}!`
        : 'Bienvenido/a!';

    // Cargar posts del usuario
    async function loadPosts() {
        const { data: posts, error: postsError } = await supabase
            .from('posts')
            .select('id, content, created_at')
            .eq('user_id', user.id)
            .order('created_at', { ascending: false });

        const list = document.getElementById('posts-list');
        list.innerHTML = '';
        if (postsError) {
            list.innerHTML = '<li>Error cargando posts</li>';
            return;
        }
        posts.forEach(post => {
            const li = document.createElement('li');
            li.textContent = `${post.content} (${new Date(post.created_at).toLocaleString()})`;
            li.style.marginBottom = '10px';
            li.style.background = '#f4f4f4';
            li.style.padding = '8px';
            li.style.borderRadius = '8px';
            list.appendChild(li);
        });
    }

    await loadPosts();

    // Crear nuevo post
    document.getElementById('post-form').addEventListener('submit', async e => {
        e.preventDefault();
        const content = document.getElementById('post-content').value.trim();
        if (!content) return;

        const { data, error: insertError } = await supabase
            .from('posts')
            .insert([{ user_id: user.id, content }]);

        if (insertError) {
            document.getElementById('post-error').textContent = insertError.message;
        } else {
            document.getElementById('post-error').textContent = '';
            document.getElementById('post-content').value = '';
            await loadPosts();
        }
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = 'login.html';
    });
});
</script>
</body>
</html>
