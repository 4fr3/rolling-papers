<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolling Papers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">Rolling Papers</a>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="index.html" class="active">Inicio</a></li>
            <li><a href="login.html">Ingresar</a></li>
        </ul>
    </nav>
</header>

<main class="container">
    <section class="bienvenida" id="welcome-message" style="padding:16px; border-radius:12px; margin-bottom:24px;">
        Cargando...
    </section>

    <section id="diary-section" style="display:none;">
        <form id="diary-form">
            <textarea id="entry-text" placeholder="Escribe tu entrada aquí..." required></textarea>
            <button type="submit">Guardar entrada</button>
        </form>

        <h2>Entradas guardadas</h2>
        <ul id="entries-list"></ul>
        <div id="puntos-totales" class="puntos-totales"></div>
        <button id="logout-btn">Cerrar sesión</button>
    </section>
</main>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>
<script>
const SUPABASE_URL = 'https://xooosccvdmnuzctgzjta.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhvb29zY2N2ZG1udXpjdGd6anRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU1NzQwNjIsImV4cCI6MjA3MTE1MDA2Mn0.HLqBrW71UcAkjmJj9d8vDI04Je05oBeX05u-QbWjd6c';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

document.addEventListener('DOMContentLoaded', async () => {
    const { data: { user }, error } = await supabase.auth.getUser();
    if (!user) {
        window.location.href = 'login.html';
        return;
    }
    currentUser = user;

    document.getElementById('diary-section').style.display = '';
    const welcomeMessage = document.getElementById('welcome-message');

    // Obtener username del perfil
    const { data: profileData } = await supabase.from('profiles').select('username').eq('id', user.id).single();
    welcomeMessage.textContent = profileData?.username ? `¡Bienvenido/a, ${profileData.username}!` : '¡Bienvenido/a!';

    mostrarEntradas();
});

// Logout
document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = 'login.html';
});

// Guardar nueva entrada
document.getElementById('diary-form').addEventListener('submit', async e => {
    e.preventDefault();
    const texto = document.getElementById('entry-text').value.trim();
    if (!texto) return;

    await supabase.from('entries').insert([{ user_id: currentUser.id, content: texto, points: 0 }]);
    document.getElementById('entry-text').value = '';
    mostrarEntradas();
});

// Mostrar entradas
async function mostrarEntradas() {
    const lista = document.getElementById('entries-list');
    lista.innerHTML = '';
    const { data: entradas } = await supabase.from('entries').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });

    if (!entradas || entradas.length === 0) {
        lista.innerHTML = '<li>No hay entradas aún.</li>';
        document.getElementById('puntos-totales').textContent = '';
        return;
    }

    let puntosTotales = 0;

    entradas.forEach(entrada => {
        if (typeof entrada.points !== 'number') entrada.points = 0;
        puntosTotales += entrada.points;

        const li = document.createElement('li');
        li.innerHTML = `
            <article style="margin-bottom:12px; padding:12px; border:1px solid #ccc; border-radius:8px;">
                <strong>${new Date(entrada.created_at).toLocaleString()}</strong><br>
                ${entrada.content}<br>
                <div class="feedback">
                    <button class="valorar" data-id="${entrada.id}" data-valor="1">👍</button>
                    <button class="valorar" data-id="${entrada.id}" data-valor="-1">👎</button>
                    <span class="puntos">Puntos: <b>${entrada.points}</b></span>
                </div>
            </article>
        `;
        lista.appendChild(li);
    });

    document.getElementById('puntos-totales').textContent = `Puntos totales: ${puntosTotales}`;

    document.querySelectorAll('.valorar').forEach(btn => {
        btn.addEventListener('click', async function() {
            const id = this.dataset.id;
            const valor = parseInt(this.dataset.valor);
            await valorarEntrada(id, valor);
        });
    });
}

// Valorar entrada
async function valorarEntrada(id, valor) {
    const { data: entradaArr } = await supabase.from('entries').select('points').eq('id', id).single();
    let puntos = entradaArr?.points || 0;
    puntos += valor;
    await supabase.from('entries').update({ points: puntos }).eq('id', id);
    mostrarEntradas();
}
</script>
</body>
</html>
