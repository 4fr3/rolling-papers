<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rolling Papers</title>
<link rel="stylesheet" href="main.css">
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; }
.container { max-width:800px; margin:auto; padding:20px; }
.navbar { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background:#222; color:white; }
.nav-links { list-style:none; display:flex; gap:15px; }
.nav-links a { color:white; text-decoration:none; }
.nav-links a.active { text-decoration:underline; }
.entries-list { list-style:none; padding:0; }
.entries-list li { background:white; padding:15px; margin-bottom:10px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); opacity:0; transform:translateY(20px); animation:fadeInUp 0.5s forwards; }
.entry-header { display:flex; justify-content:space-between; font-size:0.9em; color:#555; margin-bottom:6px; }
.entry-title { font-weight:bold; font-size:1.1em; margin-bottom:6px; }
.entry-content { margin-bottom:6px; }
.entry-points { font-size:0.9em; color:#888; }
@keyframes fadeInUp { to { opacity:1; transform:translateY(0); } }
#diary-form textarea { width:100%; height:100px; margin-bottom:8px; padding:8px; }
#diary-form input { width:100%; padding:8px; }
#diary-form button { padding:10px 15px; cursor:pointer; }
</style>
</head>
<body>
<header>
<nav class="navbar">
<a href="#" class="nav-logo">Mi Diario</a>
<ul class="nav-links">
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="#" class="active">Inicio</a></li>
<li><a href="login.html">Ingresar</a></li>
</ul>
</nav>
</header>

<div class="container">
<h1>Mi Diario</h1>
<div class="bienvenida">
<p>¡Bienvenido/a a <strong>Mi Diario</strong>! Escribe y comparte tus pensamientos. Cada escrito puede ser valorado y ganar puntos.</p>
</div>

<form id="diary-form" style="display:none;">
<input type="text" id="entry-title" placeholder="Título de la entrada" required style="margin-bottom:8px;">
<textarea id="entry-text" placeholder="Escribe tu entrada..." required></textarea>
<button type="submit">Guardar entrada</button>
</form>

<button id="logout-btn" style="display:none; margin-bottom:24px;">Cerrar sesión</button>

<h2>Entradas recientes</h2>
<ul id="recent-entries" class="entries-list"></ul>

<h2>Mejores valoradas</h2>
<ul id="top-entries" class="entries-list"></ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://xooosccvdmnuzctgzjta.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhvb29zY2N2ZG1udXpjdGd6anRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU1NzQwNjIsImV4cCI6MjA3MTE1MDA2Mn0.HLqBrW71UcAkjmJj9d8vDI04Je05oBeX05u-QbWjd6c';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let recentOffset = 0;
let topOffset = 0;
const limit = 5;

document.addEventListener('DOMContentLoaded', async () => {
    const { data } = await supabase.auth.getUser();
    if(!data.user){ window.location.href='login.html'; return; }
    currentUser = data.user;
    document.getElementById('diary-form').style.display='';
    document.getElementById('logout-btn').style.display='';

    cargarEntradasRecientes();
    cargarTopEntradas();
});

// Logout
document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href='login.html';
});

// Guardar entrada
document.getElementById('diary-form').addEventListener('submit', async e => {
    e.preventDefault();
    const title = document.getElementById('entry-title').value.trim();
    const content = document.getElementById('entry-text').value.trim();
    if(!title || !content || !currentUser) return;

    await supabase.from('entries').insert([{ user_id: currentUser.id, title, content, points:0, created_at:new Date() }]);
    document.getElementById('entry-title').value='';
    document.getElementById('entry-text').value='';

    recentOffset=0; topOffset=0;
    document.getElementById('recent-entries').innerHTML='';
    document.getElementById('top-entries').innerHTML='';
    cargarEntradasRecientes();
    cargarTopEntradas();
});

// Cargar recientes
async function cargarEntradasRecientes() {
    const { data: entries, error } = await supabase
        .from('entries')
        .select('id, title, content, points, created_at, user_id')
        .order('created_at', { ascending:false })
        .range(recentOffset, recentOffset+limit-1);
    if(error){ console.error(error); return; }

    for(const entry of entries){
        const { data: profile } = await supabase
            .from('profiles')
            .select('username')
            .eq('id', entry.user_id)
            .single();
        entry.username = profile?.username || 'Anónimo';
    }

    renderEntradas(entries,'recent-entries');
    recentOffset += entries.length;
}

// Cargar top
async function cargarTopEntradas() {
    const { data: entries, error } = await supabase
        .from('entries')
        .select('id, title, content, points, created_at, user_id')
        .order('points', { ascending:false })
        .range(topOffset, topOffset+limit-1);
    if(error){ console.error(error); return; }

    for(const entry of entries){
        const { data: profile } = await supabase
            .from('profiles')
            .select('username')
            .eq('id', entry.user_id)
            .single();
        entry.username = profile?.username || 'Anónimo';
    }

    renderEntradas(entries,'top-entries');
    topOffset += entries.length;
}

// Renderizar entradas
function renderEntradas(entries, containerId){
    const lista=document.getElementById(containerId);
    entries.forEach(entry=>{
        const li=document.createElement('li');
        li.innerHTML=`
            <div class="entry-header">
                <span>${entry.username}</span>
                <span>${new Date(entry.created_at).toLocaleString()}</span>
            </div>
            <div class="entry-title">${entry.title}</div>
            <div class="entry-content">${entry.content}</div>
            <div class="entry-points">Puntos: ${entry.points}</div>
        `;
        lista.appendChild(li);
    });
}

// Scroll infinito
window.addEventListener('scroll', ()=>{
    if((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 300){
        cargarEntradasRecientes();
        cargarTopEntradas();
    }
});
</script>
</body>
</html>
